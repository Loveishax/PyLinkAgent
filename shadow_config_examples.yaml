## 影子表模式配置

```yaml
# shadow_table_config.yaml
# 影子表模式配置（同一数据库内）

shadow_databases:
  # 电商系统
  - ds_type: 1
    url: jdbc:mysql://ecommerce-db:3306/shop
    username: shop_user
    password: shop_pass
    shadow_account_prefix: shadow_
    business_shadow_tables:
      # 用户相关
      users: shadow_users
      user_profiles: shadow_user_profiles
      user_addresses: shadow_user_addresses

      # 订单相关
      orders: shadow_orders
      order_items: shadow_order_items
      order_logs: shadow_order_logs

      # 商品相关
      products: shadow_products
      product_skus: shadow_product_skus
      categories: shadow_categories

      # 库存相关
      inventory: shadow_inventory
      stock_logs: shadow_stock_logs

  # 支付系统
  - ds_type: 1
    url: jdbc:mysql://payment-db:3306/payment
    username: payment_user
    shadow_account_prefix: PT_
    business_shadow_tables:
      payments: PT_payments
      refunds: PT_refunds
      transactions: PT_transactions
      settlements: PT_settlements
```

