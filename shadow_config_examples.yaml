# PyLinkAgent 影子库配置文件示例

## 开发环境配置

```yaml
# shadow_config.dev.yaml
# 开发环境影子库配置

shadow_databases:
  # MySQL 影子库
  - ds_type: 0
    url: jdbc:mysql://localhost:3306/test
    username: root
    password: root123
    shadow_url: jdbc:mysql://localhost:3307/shadow_test
    shadow_username: PT_root
    shadow_password: PT_root123
    shadow_account_prefix: PT_
    business_shadow_tables:
      users: shadow_users
      orders: shadow_orders
      products: shadow_products

  # PostgreSQL 影子库
  - ds_type: 0
    url: jdbc:postgresql://localhost:5432/app
    username: app_user
    password: app_pass
    shadow_url: jdbc:postgresql://localhost:5433/shadow_app
    shadow_username: PT_app_user
    shadow_password: PT_app_pass
    shadow_account_prefix: PT_
    business_shadow_tables:
      t_user: shadow_t_user
      t_order: shadow_t_order
```

---

## 生产环境配置

```yaml
# shadow_config.prod.yaml
# 生产环境影子库配置

shadow_databases:
  # 主数据库影子库
  - ds_type: 0
    url: jdbc:mysql://prod-master.db:3306/main_db
    username: prod_user
    password: "${DB_PASSWORD}"  # 使用环境变量
    shadow_url: jdbc:mysql://shadow-master.db:3306/main_db
    shadow_username: PT_prod_user
    shadow_password: "${SHADOW_DB_PASSWORD}"
    shadow_account_prefix: PT_
    shadow_account_suffix: _PRESSURE
    business_shadow_tables:
      customers: PT_customers
      orders: PT_orders
      transactions: PT_transactions
      products: PT_products

  # 从数据库影子库
  - ds_type: 0
    url: jdbc:mysql://prod-slave.db:3306/main_db
    username: read_user
    shadow_url: jdbc:mysql://shadow-slave.db:3306/main_db
    shadow_username: PT_read_user
    shadow_account_prefix: PT_
    business_shadow_tables:
      customers: PT_customers
      orders: PT_orders

  # 影子表模式（同一库内）
  - ds_type: 1
    url: jdbc:mysql://prod-db:3306/analytics
    username: analytics_user
    shadow_account_prefix: shadow_
    business_shadow_tables:
      report_daily: shadow_report_daily
      report_monthly: shadow_report_monthly
      report_summary: shadow_report_summary
```

