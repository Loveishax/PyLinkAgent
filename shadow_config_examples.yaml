## Kubernetes ConfigMap

```yaml
# shadow-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: pylinkagent-shadow-config
data:
  shadow_config.yaml: |
    shadow_databases:
      - ds_type: 0
        url: jdbc:mysql://prod-db:3306/main
        username: prod_user
        shadow_url: jdbc:mysql://shadow-db:3306/main
        shadow_username: PT_prod_user
        shadow_account_prefix: PT_
        business_shadow_tables:
          users: PT_users
          orders: PT_orders
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pylinkagent-app
spec:
  template:
    spec:
      containers:
        - name: app
          volumeMounts:
            - name: shadow-config
              mountPath: /etc/pylinkagent
      volumes:
        - name: shadow-config
          configMap:
            name: pylinkagent-shadow-config
```

