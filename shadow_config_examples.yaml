## Docker Compose 配置

```yaml
# docker-compose.yml
version: '3.8'

services:
  app:
    image: myapp:latest
    environment:
      # 使用环境变量
      - PYLINKAGENT_SHADOW_CONFIG_FILE=/etc/pylinkagent/shadow.yaml

      # 或者使用 JSON 格式
      # - PYLINKAGENT_SHADOW_CONFIGS=[{"ds_type":0,"url":"jdbc:mysql://db:3306/test","shadow_url":"jdbc:mysql://shadow-db:3306/test"}]
    volumes:
      - ./shadow_config.prod.yaml:/etc/pylinkagent/shadow.yaml:ro
    ports:
      - "8000:8000"
      - "8081:8081"  # 配置 API 端口

  # 业务数据库
  mysql-business:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: test
    ports:
      - "3306:3306"

  # 影子数据库
  mysql-shadow:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: shadow_test
    ports:
      - "3307:3306"
```

