## 环境变量格式

```bash
# .env 文件
# 使用环境变量加载影子库配置

# 方式 1: JSON 数组格式
PYLINKAGENT_SHADOW_CONFIGS='[
  {
    "ds_type": 0,
    "url": "jdbc:mysql://localhost:3306/test",
    "username": "root",
    "password": "root123",
    "shadow_url": "jdbc:mysql://localhost:3307/shadow_test",
    "shadow_username": "PT_root",
    "shadow_password": "PT_root123",
    "shadow_account_prefix": "PT_",
    "business_shadow_tables": {
      "users": "shadow_users",
      "orders": "shadow_orders"
    }
  }
]'

# 方式 2: 单个配置
PYLINKAGENT_SHADOW_URL=jdbc:mysql://localhost:3306/test
PYLINKAGENT_SHADOW_SHADOW_URL=jdbc:mysql://localhost:3307/shadow_test
PYLINKAGENT_SHADOW_USERNAME=root
PYLINKAGENT_SHADOW_PASSWORD=root123
PYLINKAGENT_SHADOW_SHADOW_USERNAME=PT_root
PYLINKAGENT_SHADOW_SHADOW_PASSWORD=PT_root123
PYLINKAGENT_SHADOW_ACCOUNT_PREFIX=PT_
PYLINKAGENT_SHADOW_TABLE_MAPPING=users:shadow_users,orders:shadow_orders
```

