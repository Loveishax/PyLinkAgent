## 库 + 表混合模式配置

```yaml
# shadow_hybrid_config.yaml
# 影子库 + 影子表混合模式配置

shadow_databases:
  # 核心业务 - 影子库 + 影子表
  - ds_type: 2
    url: jdbc:mysql://core-db:3306/business
    username: core_user
    password: core_pass
    shadow_url: jdbc:mysql://shadow-core-db:3306/business
    shadow_username: PT_core_user
    shadow_password: PT_core_pass
    shadow_account_prefix: PT_
    business_shadow_tables:
      # 核心表使用影子库中的影子表
      customers: PT_customers
      accounts: PT_accounts
      transactions: PT_transactions

      # 日志表使用影子库中的原表名（不配置映射）
      # operation_logs -> operation_logs (自动使用原表名)

  # 报表系统 - 仅影子表
  - ds_type: 1
    url: jdbc:mysql://report-db:3306/reports
    username: report_user
    shadow_account_prefix: shadow_
    business_shadow_tables:
      daily_summary: shadow_daily_summary
      monthly_summary: shadow_monthly_summary
      yearly_summary: shadow_yearly_summary
```

