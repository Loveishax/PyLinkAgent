## 使用建议

### 开发环境
- 使用 YAML 配置文件
- 配置简单，便于修改
- 本地启动影子库

### 测试环境
- 使用环境变量或配置文件
- 模拟生产配置
- 完整验证影子库功能

### 生产环境
- 使用远程配置中心
- 配置集中管理
- 支持热更新
- 敏感信息使用密钥管理

